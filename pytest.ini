[pytest]
# Pytest configuration file for IDE test discovery and execution

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Python path - ensure src is in the path
pythonpath = . src

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short

# Markers for categorizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
